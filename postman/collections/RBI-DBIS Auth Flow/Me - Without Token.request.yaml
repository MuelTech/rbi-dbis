$kind: http-request
url: "{{baseUrl}}/auth/me"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 401', function () {
        pm.response.to.have.status(401);
      });

      pm.test('Body has error message', function () {
        var json = pm.response.json();
        pm.expect(json).to.have.property('error');
      });
    language: text/javascript
order: 4000
