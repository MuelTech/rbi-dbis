$kind: http-request
url: "{{baseUrl}}/health"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', function () {
        pm.response.to.have.status(200);
      });

      pm.test('Body has status ok', function () {
        var json = pm.response.json();
        pm.expect(json.status).to.eql('ok');
      });
    language: text/javascript
order: 1000
